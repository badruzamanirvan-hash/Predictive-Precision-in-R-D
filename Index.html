  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n          <div style=\"background:#fff;border:1px solid #E4EAF2;border-radius:16px;padding:22px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n              <div style=\"font-size:14px;font-weight:800;color:#0B1F3A\">Digital-twin route simulation<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:600;color:#64748B;font-family:'IBM Plex Mono',monospace\">{{ scenarioRoute }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#64748B;margin-bottom:16px\">Container-interior temperature modelled across the journey. <span style=\"color:{{ accent }};font-weight:700\">{{ route.exposureStr }}<\u002Fspan> above the 50°C stress threshold.<\u002Fdiv>\n            <svg viewBox=\"0 0 640 230\" style=\"width:100%;height:auto;display:block\">\n              <defs>\n                <linearGradient id=\"tg\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"{{ accent }}\" stop-opacity=\"0.28\"><\u002Fstop><stop offset=\"100%\" stop-color=\"{{ accent }}\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient>\n              <\u002Fdefs>\n              <line x1=\"40\" y1=\"40\" x2=\"40\" y2=\"195\" stroke=\"#E4EAF2\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"40\" y1=\"195\" x2=\"625\" y2=\"195\" stroke=\"#E4EAF2\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"40\" y1=\"{{ route.threshY }}\" x2=\"625\" y2=\"{{ route.threshY }}\" stroke=\"#DC2626\" stroke-width=\"1.4\" stroke-dasharray=\"5 5\" opacity=\"0.65\"><\u002Fline>\n              <text x=\"46\" y=\"{{ route.threshLabelY }}\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#DC2626\" font-weight=\"600\">50°C stress threshold<\u002Ftext>\n              <path d=\"{{ route.areaPath }}\" fill=\"url(#tg)\"><\u002Fpath>\n              <path d=\"{{ route.linePath }}\" fill=\"none\" stroke=\"{{ accent }}\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <circle cx=\"{{ route.peakX }}\" cy=\"{{ route.peakY }}\" r=\"5.5\" fill=\"#fff\" stroke=\"{{ accent }}\" stroke-width=\"2.6\"><\u002Fcircle>\n              <text x=\"{{ route.peakLabelX }}\" y=\"{{ route.peakLabelY }}\" font-family=\"IBM Plex Mono\" font-size=\"12\" font-weight=\"600\" fill=\"#0B1F3A\" text-anchor=\"middle\">{{ route.peakStr }}<\u002Ftext>\n              <text x=\"30\" y=\"48\" font-family=\"IBM Plex Mono\" font-size=\"9.5\" fill=\"#94A3B8\" text-anchor=\"end\">70°<\u002Ftext>\n              <text x=\"30\" y=\"198\" font-family=\"IBM Plex Mono\" font-size=\"9.5\" fill=\"#94A3B8\" text-anchor=\"end\">20°<\u002Ftext>\n              <text x=\"40\" y=\"213\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#64748B\">Day 0 · {{ originCity }}<\u002Ftext>\n              <text x=\"625\" y=\"213\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#64748B\" text-anchor=\"end\">Day {{ transit }} · {{ destCity }}<\u002Ftext>\n            <\u002Fsvg>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #E4EAF2;border-radius:16px;padding:22px;display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:center\">\n            <svg viewBox=\"0 0 160 230\" style=\"width:100%;height:auto\">\n              <rect x=\"62\" y=\"14\" width=\"36\" height=\"22\" rx=\"4\" fill=\"none\" stroke=\"{{ risk.leakColor }}\" stroke-width=\"2.4\"><\u002Frect>\n              <rect x=\"68\" y=\"36\" width=\"24\" height=\"14\" rx=\"2\" fill=\"none\" stroke=\"{{ risk.leakColor }}\" stroke-width=\"1.8\" opacity=\"0.7\"><\u002Frect>\n              <rect x=\"58\" y=\"56\" width=\"44\" height=\"58\" rx=\"5\" fill=\"{{ risk.labelTint }}\" stroke=\"{{ risk.labelColor }}\" stroke-width=\"2.4\"><\u002Frect>\n              <path d=\"M52 116 Q52 124 60 124 L100 124 Q108 124 108 116 L108 210 Q108 220 98 220 L62 220 Q52 220 52 210 Z\" fill=\"{{ risk.deformTint }}\" stroke=\"{{ risk.deformColor }}\" stroke-width=\"2.4\"><\u002Fpath>\n              <line x1=\"80\" y1=\"2\" x2=\"80\" y2=\"226\" stroke=\"#CBD5E1\" stroke-width=\"0.8\" stroke-dasharray=\"3 3\" opacity=\"0.5\"><\u002Fline>\n            <\u002Fsvg>\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <div style=\"font-size:14px;font-weight:800;color:#0B1F3A;margin-bottom:2px\">Failure anatomy<\u002Fdiv>\n              <sc-for list=\"{{ anatomyRows }}\" as=\"a\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:12px\">\n                  <span style=\"width:11px;height:11px;border-radius:3px;background:{{ a.color }};flex-shrink:0\"><\u002Fspan>\n                  <span style=\"font-size:13px;font-weight:600;color:#0B1F3A;flex:1\">{{ a.label }}<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:{{ a.color }}\">{{ a.value }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"font-size:12px;color:#64748B;line-height:1.5;margin-top:4px;border-top:1px solid #EEF2F8;padding-top:12px\">{{ anatomyNote }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- OPTIMIZE -->\n      <sc-if value=\"{{ isOptimize }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"background:#fff;border:1px solid #E4EAF2;border-radius:16px;padding:8px 8px 8px 20px;display:flex;align-items:center;gap:14px;margin-bottom:24px;box-shadow:0 1px 0 rgba(11,31,58,.02)\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex-shrink:0\"><circle cx=\"11\" cy=\"11\" r=\"7\" stroke=\"{{ accent }}\" stroke-width=\"2\"><\u002Fcircle><path d=\"M16 16l5 5\" stroke=\"{{ accent }}\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:14px;color:#64748B;font-weight:600\">AI query:<\u002Fspan>\n          <span style=\"font-size:15px;color:#0B1F3A;font-weight:700;flex:1\">Cheapest packaging for {{ destCity }} that keeps damage risk below<\u002Fspan>\n          <div style=\"display:flex;align-items:center;gap:12px;background:#F4F7FB;border-radius:11px;padding:8px 16px\">\n            <input type=\"range\" min=\"0.3\" max=\"3\" step=\"0.1\" value=\"{{ threshold }}\" onchange=\"{{ onThreshold }}\" style=\"width:130px;--ax:{{ accent }}\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;color:{{ accent }};min-width:46px\">{{ thresholdStr }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:24px;align-items:start\">\n          <sc-for list=\"{{ packages }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <div style=\"{{ p.cardStyle }}\">\n              <div style=\"{{ p.ribbonStyle }}\">{{ p.ribbon }}<\u002Fdiv>\n              <div style=\"font-size:11px;font-weight:700;letter-spacing:.5px;color:{{ p.tierColor }};margin-bottom:4px\">{{ p.tier }}<\u002Fdiv>\n              <div style=\"font-size:19px;font-weight:800;color:#0B1F3A;margin-bottom:14px\">{{ p.name }}<\u002Fdiv>\n              <div style=\"display:flex;gap:18px;margin-bottom:16px\">\n                <div>\n                  <div style=\"font-size:11px;color:#64748B;font-weight:600;margin-bottom:3px\">Unit cost<\u002Fdiv>\n                  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:#0B1F3A\">{{ p.cost }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:11px;color:#64748B;font-weight:600;margin-bottom:3px\">Damage risk<\u002Fdiv>\n                  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:{{ p.riskColor }}\">{{ p.risk }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#475569;line-height:1.5;background:#F7F9FC;border-radius:9px;padding:10px 12px;margin-bottom:14px;font-family:'IBM Plex Mono',monospace\">{{ p.spec }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:{{ p.verdictColor }}\">\n                <span style=\"width:8px;height:8px;border-radius:50%;background:{{ p.verdictColor }}\"><\u002Fspan>{{ p.verdict }}\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"background:linear-gradient(120deg,#0D2143,#13315C);border-radius:16px;padding:24px 28px;color:#fff;display:flex;align-items:center;gap:24px\">\n          <div style=\"width:46px;height:46px;border-radius:12px;background:rgba(95,224,232,.16);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:{{ aiBoxGlow }}\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1\" stroke=\"#5FE0E8\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3\" stroke=\"#5FE0E8\" stroke-width=\"1.8\"><\u002Fcircle><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"flex:1\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.6px;color:#5FE0E8;margin-bottom:5px\">AI RECOMMENDATION<\u002Fdiv>\n            <div style=\"font-size:15px;line-height:1.6;color:#E7EEF8\">{{ optimizeSummary }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- EXECUTIVE -->\n      <sc-if value=\"{{ isExec }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid #E4EAF2;border-radius:14px;padding:16px 22px;margin-bottom:22px\">\n          <div style=\"font-size:13px;font-weight:700;color:#0B1F3A\">Annual export volume to hot-climate markets<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:16px\">\n            <input type=\"range\" min=\"5\" max=\"50\" step=\"1\" value=\"{{ annualUnits }}\" onchange=\"{{ onUnits }}\" style=\"width:220px;--ax:{{ accent }}\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;color:{{ accent }};min-width:90px;text-align:right\">{{ unitsStr }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px\">\n          <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #E4EAF2;border-radius:16px;padding:20px;position:relative;overflow:hidden\">\n              <div style=\"position:absolute;top:0;left:0;width:100%;height:3px;background:{{ k.bar }}\"><\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:700;color:#64748B;margin-bottom:10px\">{{ k.label }}<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;color:#0B1F3A;letter-spacing:-.5px\">{{ k.value }}<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:600;color:{{ k.deltaColor }};margin-top:6px\">{{ k.delta }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start\">\n          <div style=\"background:#fff;border:1px solid #E4EAF2;border-radius:16px;padding:24px\">\n            <div style=\"font-size:15px;font-weight:800;color:#0B1F3A;margin-bottom:4px\">The executive ledger<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#64748B;margin-bottom:20px\">Per-unit economics, before and after AI optimization.<\u002Fdiv>\n            <sc-for list=\"{{ ledgerRows }}\" as=\"l\" hint-placeholder-count=\"3\">\n              <div style=\"margin-bottom:18px\">\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;color:#0B1F3A;margin-bottom:7px\"><span>{{ l.label }}<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;color:{{ accent }}\">{{ l.improve }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:10px;align-items:center\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#94A3B8;width:78px;text-align:right\">{{ l.before }}<\u002Fspan>\n                  <div style=\"flex:1;height:22px;background:#F1F4F9;border-radius:7px;position:relative;overflow:hidden\">\n                    <div style=\"position:absolute;left:0;top:0;height:100%;width:{{ l.beforeW }};background:#CBD5E1;border-radius:7px\"><\u002Fdiv>\n                    <div style=\"position:absolute;left:0;top:0;height:100%;width:{{ l.afterW }};background:linear-gradient(90deg,{{ accent }},#06B6D4);border-radius:7px;transition:width .5s\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#0B1F3A;width:78px\">{{ l.after }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"display:flex;gap:18px;font-size:11px;color:#64748B;margin-top:4px\"><span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#CBD5E1\"><\u002Fspan>Before AI<\u002Fspan><span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:10px;height:10px;border-radius:3px;background:linear-gradient(90deg,{{ accent }},#06B6D4)\"><\u002Fspan>After AI<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:linear-gradient(135deg,#0D2143,#13315C);border-radius:16px;padding:26px;color:#fff;height:100%\">\n            <div style=\"font-size:12px;font-weight:700;letter-spacing:.6px;color:#5FE0E8;margin-bottom:8px\">PROJECTED ANNUAL IMPACT<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:42px;font-weight:600;letter-spacing:-1.5px;margin-bottom:6px\">{{ savingsStr }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#B9CAE4;margin-bottom:22px\">Net packaging-spend savings on {{ unitsStr }} units<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n              <sc-for list=\"{{ impactRows }}\" as=\"i\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;padding-bottom:13px;border-bottom:1px solid rgba(255,255,255,.1)\">\n                  <span style=\"font-size:13px;color:#B9CAE4\">{{ i.label }}<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;color:{{ i.color }}\">{{ i.value }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#7E93B5;margin-top:16px;line-height:1.5;font-style:italic\">{{ execFootnote }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563EB&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;aiGlow&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'overview',\n    product: 'bottle', thickness: 0.8, seal: 'foil', adhesive: 'standard',\n    market: 'UAE', transit: 18,\n    threshold: 1.5, annualUnits: 20,\n  };\n\n  MARKETS = {\n    UAE:       { name: 'UAE',          city: 'Dubai',          peakTemp: 55, ambient: 33, humidity: 45, transit: 18 },\n    Saudi:     { name: 'Saudi Arabia', city: 'Riyadh',         peakTemp: 58, ambient: 35, humidity: 30, transit: 21 },\n    Vietnam:   { name: 'Vietnam',      city: 'Ho Chi Minh',    peakTemp: 38, ambient: 28, humidity: 82, transit: 9  },\n    Indonesia: { name: 'Indonesia',    city: 'Jakarta (dom.)', peakTemp: 34, ambient: 27, humidity: 78, transit: 4  },\n  };\n  PRODUCTS = {\n    pump:   { label: 'Pump Dispenser', leakMul: 1.25, labelMul: 1.0, deformMul: 0.9, costBase: 0.062 },\n    bottle: { label: 'PET Bottle',     leakMul: 1.0,  labelMul: 1.0, deformMul: 1.0, costBase: 0.058 },\n    carton: { label: 'Carton',         leakMul: 0.25, labelMul: 1.15, deformMul: 1.35, costBase: 0.050 },\n  };\n\n  clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }\n\n  computeRisk(spec, market, transit) {\n    const m = this.MARKETS[market];\n    const p = this.PRODUCTS[this.state.product];\n    const thermal = Math.max(0, m.peakTemp - 45);\n    const tf = transit / 14;\n    const sealBonus = { none: 0, foil: 3, induction: 6 }[spec.seal];\n    const adhBonus = spec.adhesive === 'hightemp' ? 8 : 0;\n    let leak  = (2 + thermal * 0.9 + tf * 3 - sealBonus) * p.leakMul;\n    let label = (3 + thermal * 1.1 + m.humidity * 0.05 + tf * 2 - adhBonus) * p.labelMul;\n    let deform = (1 + thermal * 0.2 * (0.9 / spec.thickness)) * p.deformMul;\n    leak = this.clamp(leak, 0.2, 42); label = this.clamp(label, 0.2, 42); deform = this.clamp(deform, 0.2, 42);\n    const overall = leak * 0.06 + label * 0.05 + deform * 0.04;\n    return { leak, label, deform, overall };\n  }\n  computeCost(spec) {\n    const p = this.PRODUCTS[this.state.product];\n    const sealC = { none: 0, foil: 0.02, induction: 0.05 }[spec.seal];\n    const adhC = spec.adhesive === 'hightemp' ? 0.04 : 0.02;\n    return p.costBase * (spec.thickness / 0.8) + sealC + adhC;\n  }\n  optimize() {\n    const cands = [];\n    for (const seal of ['foil', 'induction'])\n      for (const adhesive of ['standard', 'hightemp'])\n        for (const thickness of [0.6, 0.8, 1.0, 1.2]) {\n          const spec = { seal, adhesive, thickness };\n          const r = this.computeRisk(spec, this.state.market, this.state.transit);\n          cands.push({ spec, risk: r.overall, cost: this.computeCost(spec) });\n        }\n    const cheapest = [...cands].sort((a, b) => a.cost - b.cost)[0];\n    const safest = [...cands].sort((a, b) => a.risk - b.risk)[0];\n    const under = cands.filter(c => c.risk < this.state.threshold).sort((a, b) => a.cost - b.cost);\n    const best = under[0] || safest;\n    return { cheapest, best, safest };\n  }\n\n  setField = (k, v) => this.setState({ [k]: v });\n  setView = (v) => this.setState({ view: v });\n\n  // shared style builders\n  seg(active, accent) {\n    return active\n      ? `flex:1;padding:9px 6px;border-radius:9px;border:1px solid ${accent};background:${accent};color:#fff;font:700 12.5px 'Plus Jakarta Sans';cursor:pointer;transition:all .15s`\n      : `flex:1;padding:9px 6px;border-radius:9px;border:1px solid #E4EAF2;background:#fff;color:#475569;font:600 12.5px 'Plus Jakarta Sans';cursor:pointer;transition:all .15s`;\n  }\n  fmtRisk(v) { return v.toFixed(1) + '%'; }\n  riskColor(v, a, b) { return v < a ? '#15A34A' : v < b ? '#F59E0B' : '#DC2626'; }\n  tint(c) { return c === '#15A34A' ? '#E7F6EC' : c === '#F59E0B' ? '#FEF3DC' : '#FCEAEA'; }\n\n  renderVals() {\n    const s = this.state;\n    const accent = this.props.accent ?? '#2563EB';\n    const glow = (this.props.aiGlow ?? true);\n    const m = this.MARKETS[s.market];\n    const p = this.PRODUCTS[s.product];\n\n    const curSpec = { seal: s.seal, adhesive: s.adhesive, thickness: s.thickness };\n    const R = this.computeRisk(curSpec, s.market, s.transit);\n\n    // nav\n    const navDef = [\n      { key: 'overview', label: 'Overview' },\n      { key: 'predictor', label: 'Risk Predictor' },\n      { key: 'optimize', label: 'Optimization' },\n      { key: 'executive', label: 'Executive Ledger' },\n    ];\n    const navItems = navDef.map(n => {\n      const active = s.view === n.key;\n      return {\n        key: n.key, label: n.label,\n        onClick: () => this.setView(n.key),\n        style: `display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 12px;border-radius:10px;border:none;cursor:pointer;font:600 13.5px 'Plus Jakarta Sans';text-align:left;transition:all .15s;${active ? `background:${accent};color:#fff;box-shadow:0 4px 14px ${accent}55` : 'background:transparent;color:#A9BBD8'}`,\n        dotStyle: active ? 'width:6px;height:6px;border-radius:50%;background:#5FE0E8' : 'width:6px;height:6px;border-radius:50%;background:transparent',\n      };\n    });\n\n    const titles = {\n      overview:  { crumb: 'Home',          title: 'Packaging Intelligence' },\n      predictor: { crumb: 'R&D Studio',    title: 'Predictive Risk Studio' },\n      optimize:  { crumb: 'Decision',      title: 'Optimization Engine' },\n      executive: { crumb: 'Boardroom',     title: 'Executive Ledger' },\n    }[s.view];\n\n    // route simulation curve\n    const x0 = 40, x1 = 625, yTop = 40, yBot = 195, tMin = 20, tMax = 70;\n    const yOf = t => yBot - (this.clamp(t, tMin, tMax) - tMin) / (tMax - tMin) * (yBot - yTop);\n    const N = 36; const pts = [];\n    let peak = { t: -1, x: 0, y: 0 }; let above = 0;\n    for (let i = 0; i <= N; i++) {\n      const f = i / N;\n      const bump = Math.max(0, 1 - Math.pow((f - 0.6) / 0.62, 2));\n      const t = m.ambient + (m.peakTemp - m.ambient) * bump + 2.2 * Math.sin(f * s.transit * 0.85);\n      const x = x0 + f * (x1 - x0); const y = yOf(t);\n      pts.push([x, y]);\n      if (t > peak.t) peak = { t, x, y };\n      if (t > 50) above++;\n    }\n    const linePath = pts.map((pt, i) => (i ? 'L' : 'M') + pt[0].toFixed(1) + ' ' + pt[1].toFixed(1)).join(' ');\n    const areaPath = linePath + ` L${x1} ${yBot} L${x0} ${yBot} Z`;\n    const exposureDays = (above / N) * s.transit;\n    const threshY = yOf(50);\n\n    // risk rows\n    const leakC = this.riskColor(R.leak, 6, 12), labelC = this.riskColor(R.label, 8, 16), defC = this.riskColor(R.deform, 4, 8);\n    const tagOf = c => c === '#15A34A' ? 'LOW' : c === '#F59E0B' ? 'WATCH' : 'HIGH';\n    const riskRows = [\n      { label: 'Leakage', value: this.fmtRisk(R.leak), width: Math.min(100, R.leak / 42 * 100) + '%', color: leakC, tint: this.tint(leakC), tag: tagOf(leakC) },\n      { label: 'Label failure', value: this.fmtRisk(R.label), width: Math.min(100, R.label / 42 * 100) + '%', color: labelC, tint: this.tint(labelC), tag: tagOf(labelC) },\n      { label: 'Deformation', value: this.fmtRisk(R.deform), width: Math.min(100, R.deform / 42 * 100) + '%', color: defC, tint: this.tint(defC), tag: tagOf(defC) },\n    ];\n    const anatomyRows = [\n      { label: 'Cap / seal — leakage', value: this.fmtRisk(R.leak), color: leakC },\n      { label: 'Label — adhesion failure', value: this.fmtRisk(R.label), color: labelC },\n      { label: 'Body — deformation', value: this.fmtRisk(R.deform), color: defC },\n    ];\n    const overallC = R.overall < 1 ? '#15A34A' : R.overall < 3 ? '#F59E0B' : '#DC2626';\n    const verdict = R.overall < 1 ? 'Ship-ready' : R.overall < 3 ? 'Marginal — optimize' : 'High risk — redesign';\n    const worst = riskRows.reduce((a, b) => (parseFloat(b.value) > parseFloat(a.value) ? b : a));\n    const anatomyNote = `${worst.label} is the dominant failure mode at ${m.peakTemp}°C peak over ${s.transit} days. ${s.adhesive === 'standard' && R.label > 12 ? 'Switching to high-temp adhesive would cut label risk sharply.' : s.seal === 'foil' && R.leak > 10 ? 'An induction seal would materially reduce leakage.' : 'Configuration is well balanced for this lane.'}`;\n\n    // optimize\n    const opt = this.optimize();\n    const specStr = c => `${c.spec.thickness.toFixed(1)}mm · ${c.spec.seal} seal · ${c.spec.adhesive === 'hightemp' ? 'high-temp' : 'standard'} label`;\n    const cardBase = 'background:#fff;border-radius:16px;padding:22px;position:relative;transition:all .2s';\n    const mk = (c, tier, tierColor, name, recommended, verdictTxt, verdictColor) => ({\n      tier, tierColor, name,\n      cost: '$' + c.cost.toFixed(2),\n      risk: c.risk.toFixed(1) + '%',\n      riskColor: c.risk < s.threshold ? '#15A34A' : '#DC2626',\n      spec: specStr(c),\n      verdict: verdictTxt, verdictColor,\n      cardStyle: recommended ? `${cardBase};border:2px solid ${accent};box-shadow:0 12px 36px ${accent}33${glow ? ',0 0 0 4px ' + accent + '14' : ''}` : `${cardBase};border:1px solid #E4EAF2`,\n      ribbon: recommended ? 'AI RECOMMENDED' : '',\n      ribbonStyle: recommended ? `position:absolute;top:-11px;left:22px;background:${accent};color:#fff;font:700 10px 'Plus Jakarta Sans';letter-spacing:.5px;padding:5px 11px;border-radius:999px` : 'display:none',\n    });\n    const aMeets = opt.cheapest.risk < s.threshold;\n    const bestMeets = opt.best.risk < s.threshold;\n    const packages = [\n      mk(opt.cheapest, 'ECONOMY', '#94A3B8', 'Lowest cost', false, aMeets ? 'Meets threshold' : 'Fails risk threshold', aMeets ? '#15A34A' : '#DC2626'),\n      mk(opt.best, 'OPTIMAL', accent, 'Cost-risk sweet spot', true, bestMeets ? 'Optimal: meets target at lowest cost' : 'Closest achievable — no spec hits target', bestMeets ? '#15A34A' : '#F59E0B'),\n      mk(opt.safest, 'PREMIUM', '#0B1F3A', 'Lowest risk', false, opt.safest.cost > opt.best.cost * 1.12 ? 'Over-engineered for target' : 'Maximum protection', opt.safest.cost > opt.best.cost * 1.12 ? '#F59E0B' : '#15A34A'),\n    ];\n    const optimizeSummary = bestMeets\n      ? `For ${m.city}, the optimal spec is ${specStr(opt.best)} at $${opt.best.cost.toFixed(2)}/unit — holding damage risk to ${opt.best.risk.toFixed(1)}%, under your ${s.threshold.toFixed(1)}% target. The lowest-cost option ($${opt.cheapest.cost.toFixed(2)}) ${aMeets ? 'also clears the bar' : `fails at ${opt.cheapest.risk.toFixed(1)}%`}, while maximum protection costs $${opt.safest.cost.toFixed(2)} for only ${Math.max(0, opt.best.risk - opt.safest.risk).toFixed(1)}pp less risk — unnecessary over-spend.`\n      : `No spec on the ${m.city} lane can hit ${s.threshold.toFixed(1)}% — this route is too severe. The lowest achievable risk is ${opt.safest.risk.toFixed(1)}% at $${opt.safest.cost.toFixed(2)}/unit. Loosen the target toward ${(Math.ceil(opt.safest.risk * 10) / 10).toFixed(1)}% or shorten transit to unlock cheaper options.`;\n\n    // executive\n    const beforeSpec = { seal: 'induction', adhesive: 'standard', thickness: 1.0 };\n    const beforeR = this.computeRisk(beforeSpec, s.market, s.transit).overall;\n    const beforeCost = this.computeCost(beforeSpec);\n    const afterCost = opt.best.cost, afterR = opt.best.risk;\n    const units = s.annualUnits * 1e6;\n    const savings = Math.max(0, (beforeCost - afterCost)) * units;\n    const claimRed = beforeR > 0 ? (beforeR - afterR) / beforeR : 0;\n    const fmtMoney = v => v >= 1e6 ? '$' + (v / 1e6).toFixed(2) + 'M' : '$' + Math.round(v / 1000) + 'K';\n    const spendDelta = (beforeCost - afterCost) / beforeCost;\n\n    const kpis = [\n      { label: 'Annual savings', value: fmtMoney(savings), bar: `linear-gradient(90deg,${accent},#06B6D4)`, delta: 'vs. before-AI baseline', deltaColor: '#15A34A' },\n      { label: 'Packaging spend', value: (spendDelta >= 0 ? '−' : '+') + Math.abs(spendDelta * 100).toFixed(0) + '%', bar: spendDelta >= 0 ? '#15A34A' : '#DC2626', delta: `$${beforeCost.toFixed(2)} → $${afterCost.toFixed(2)} / unit`, deltaColor: spendDelta >= 0 ? '#15A34A' : '#DC2626' },\n      { label: 'Damage claims', value: '−' + Math.round(claimRed * 100) + '%', bar: '#15A34A', delta: `${beforeR.toFixed(1)}% → ${afterR.toFixed(1)}% risk`, deltaColor: '#15A34A' },\n      { label: 'Time-to-market', value: '−37%', bar: '#06B6D4', delta: '4 mo → 2.5 mo qual.', deltaColor: '#15A34A' },\n    ];\n    const ledgerScale = Math.max(beforeCost, afterCost);\n    const ledgerRows = [\n      { label: 'Packaging cost / unit', before: '$' + beforeCost.toFixed(2), after: '$' + afterCost.toFixed(2), improve: '−' + Math.abs(spendDelta * 100).toFixed(0) + '%', beforeW: (beforeCost / ledgerScale * 100) + '%', afterW: (afterCost / ledgerScale * 100) + '%' },\n      { label: 'Damage rate', before: beforeR.toFixed(1) + '%', after: afterR.toFixed(1) + '%', improve: '−' + Math.round(claimRed * 100) + '%', beforeW: (beforeR / Math.max(beforeR, afterR) * 100) + '%', afterW: (afterR / Math.max(beforeR, afterR) * 100) + '%' },\n      { label: 'Qualification time', before: '4.0 mo', after: '2.5 mo', improve: '−37%', beforeW: '100%', afterW: '62%' },\n    ];\n    const impactRows = [\n      { label: 'Fewer damage claims', value: '−' + Math.round(claimRed * 100) + '%', color: '#5FE0E8' },\n      { label: 'Faster to shelf', value: '6 wks', color: '#5FE0E8' },\n      { label: 'Cost / unit reduction', value: '$' + (beforeCost - afterCost).toFixed(2), color: '#5FE0E8' },\n    ];\n    const execFootnote = `At ${s.annualUnits}M units, a $${(beforeCost - afterCost).toFixed(2)} per-unit reduction compounds into ${fmtMoney(savings)} in yearly packaging savings — before counting avoided damage claims and earlier revenue.`;\n\n    return {\n      accent,\n      logoGlow: glow ? `0 0 18px ${accent}88` : 'none',\n      aiDotGlow: glow ? '0 0 8px #06B6D4' : 'none',\n      aiBoxGlow: glow ? '0 0 26px rgba(95,224,232,.35)' : 'none',\n      navItems,\n      crumb: titles.crumb, pageTitle: titles.title,\n      isOverview: s.view === 'overview', isPredictor: s.view === 'predictor',\n      isOptimize: s.view === 'optimize', isExec: s.view === 'executive',\n      goPredict: () => this.setView('predictor'),\n\n      scenarioTitle: `${p.label} → ${m.name}`,\n      scenarioRoute: `Jakarta → ${m.city}`,\n      scenarioSpec: `${s.thickness.toFixed(1)}mm · ${s.transit}d transit`,\n      originCity: 'Jakarta', destCity: m.city,\n\n      overviewStats: [\n        { value: this.fmtRisk(R.overall), label: 'Current damage risk', sub: `${p.label} on the ${m.city} lane`, color: overallC },\n        { value: '14–20d → min', label: 'Test cycle collapsed', sub: 'Physical shipment wait eliminated', color: accent },\n        { value: '$' + opt.best.cost.toFixed(2), label: 'AI-optimal unit cost', sub: `Holds risk under ${s.threshold.toFixed(1)}%`, color: '#0B1F3A' },\n      ],\n      moduleCards: [\n        { key: 'predictor', title: 'Risk Predictor', desc: 'Set spec + route and watch leakage, label and deformation probabilities update live.', onClick: () => this.setView('predictor'), iconBg: '#E8F0FE' },\n        { key: 'optimize', title: 'Optimization Engine', desc: 'Ask for the cheapest packaging under a risk threshold; AI ranks the candidates.', onClick: () => this.setView('optimize'), iconBg: '#E6FAFB' },\n        { key: 'executive', title: 'Executive Ledger', desc: 'See cost, damage and time-to-market impact projected across millions of units.', onClick: () => this.setView('executive'), iconBg: '#EEF2F8' },\n      ],\n\n      productOptions: Object.keys(this.PRODUCTS).map(k => ({ label: this.PRODUCTS[k].label.replace(' Dispenser', ''), onClick: () => this.setField('product', k), style: this.seg(s.product === k, accent) })),\n      sealOptions: [['none', 'None'], ['foil', 'Foil'], ['induction', 'Induction']].map(([k, l]) => ({ label: l, onClick: () => this.setField('seal', k), style: this.seg(s.seal === k, accent) })),\n      adhesiveOptions: [['standard', 'Standard'], ['hightemp', 'High-temp']].map(([k, l]) => ({ label: l, onClick: () => this.setField('adhesive', k), style: this.seg(s.adhesive === k, accent) })),\n      marketOptions: Object.keys(this.MARKETS).map(k => ({ label: this.MARKETS[k].name, onClick: () => this.setField('market', k), style: this.seg(s.market === k, accent) })),\n\n      thickness: s.thickness, thicknessStr: s.thickness.toFixed(1) + ' mm',\n      transit: s.transit, transitStr: s.transit + ' days',\n      onThickness: (e) => this.setField('thickness', parseFloat(e.target.value)),\n      onTransit: (e) => this.setField('transit', parseInt(e.target.value)),\n\n      confidenceStr: (90 + Math.round((1 - R.overall / 42) * 8)) + '%',\n      risk: {\n        overallStr: R.overall.toFixed(1) + '%', verdict, verdictColor: overallC,\n        leakColor: leakC, labelColor: labelC, deformColor: defC,\n        labelTint: this.tint(labelC), deformTint: this.tint(defC),\n      },\n      riskRows, anatomyRows, anatomyNote,\n\n      route: {\n        linePath, areaPath,\n        threshY, threshLabelY: threshY - 6,\n        peakX: peak.x.toFixed(1), peakY: peak.y.toFixed(1),\n        peakLabelX: this.clamp(peak.x, 70, 590).toFixed(1), peakLabelY: (peak.y - 14).toFixed(1),\n        peakStr: Math.round(peak.t) + '°C',\n        exposureStr: exposureDays.toFixed(1) + ' days',\n      },\n\n      threshold: s.threshold, thresholdStr: s.threshold.toFixed(1) + '%',\n      onThreshold: (e) => this.setField('threshold', parseFloat(e.target.value)),\n      packages, optimizeSummary,\n\n      annualUnits: s.annualUnits, unitsStr: s.annualUnits + 'M',\n      onUnits: (e) => this.setField('annualUnits', parseInt(e.target.value)),\n      savingsStr: fmtMoney(savings),\n      kpis, ledgerRows, impactRows, execFootnote,\n    };\n  }\n\n  componentDidMount() { this._paintIcons(); }\n  componentDidUpdate() { this._paintIcons(); }\n  _paintIcons() {\n    const I = {\n      overview: '<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.8\"/><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.8\"/><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.8\"/><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.8\"/><\u002Fsvg>',\n      predictor: '<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 17l5-6 4 4 5-7 4 5\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"8\" cy=\"11\" r=\"1.3\" fill=\"currentColor\"/><circle cx=\"17\" cy=\"8\" r=\"1.3\" fill=\"currentColor\"/><\u002Fsvg>',\n      optimize: '<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 18V9M10 18V5M16 18v-6M22 18V8\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><\u002Fsvg>',\n      executive: '<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 21h18M5 21V8l7-4 7 4v13M9 21v-6h6v6\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    };\n    const CARD = {\n      predictor: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 17l5-6 4 4 5-7 4 5\" stroke=\"#2563EB\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n      optimize: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 18V9M10 18V5M16 18v-6M22 18V8\" stroke=\"#06B6D4\" stroke-width=\"2\" stroke-linecap=\"round\"/><\u002Fsvg>',\n      executive: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 21h18M5 21V8l7-4 7 4v13\" stroke=\"#0B1F3A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    };\n    try {\n      document.querySelectorAll('aside [data-icon]').forEach(el => { const k = el.getAttribute('data-icon'); if (I[k]) el.innerHTML = I[k]; });\n      document.querySelectorAll('main [data-icon]').forEach(el => { const k = el.getAttribute('data-icon'); if (CARD[k]) el.innerHTML = CARD[k]; });\n    } catch (e) {}\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
